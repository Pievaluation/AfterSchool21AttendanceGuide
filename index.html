<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS21 Attendance Tracking — Pathway Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #1F3864;
  --navy-dk:    #152749;
  --navy-lt:    #d6dff0;
  --gold:       #C09B26;
  --gold-lt:    #fdf3cc;
  --orange:     #C55A11;
  --orange-lt:  #fde8d8;
  --teal:       #1B6B64;
  --teal-lt:    #d4efec;
  --slate:      #3a5a8c;
  --bg:         #f0f2f7;
  --card-bg:    #ffffff;
  --text:       #1a2033;
  --muted:      #5a6480;
  --border:     #dde2ef;
  --shadow:     0 4px 24px rgba(31,56,100,0.10);
  --shadow-lg:  0 8px 40px rgba(31,56,100,0.15);
  --radius:     14px;
  --radius-sm:  8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Mulish', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── HEADER ─────────────────────────────────────────────────────── */
.site-header {
  background: var(--navy-dk);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  min-height: 60px;
  border-bottom: 3px solid var(--gold);
}
.site-header .logo-mark {
  width: 36px; height: 36px;
  background: var(--gold);
  border-radius: 6px;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 18px;
  color: var(--navy-dk);
  flex-shrink: 0;
}
.site-header .header-text h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 700;
  color: #fff; letter-spacing: 0.01em;
}
.site-header .header-text p {
  font-size: 11px; color: rgba(255,255,255,0.55);
  font-weight: 500;
}
.header-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ─── PROGRESS BAR ───────────────────────────────────────────────── */
.progress-bar-wrap {
  background: var(--navy);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
}
.prog-step {
  display: flex;
  align-items: center;
  gap: 0;
  cursor: default;
}
.prog-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,0.4);
  transition: all 0.3s;
  flex-shrink: 0;
  position: relative;
}
.prog-dot.done   { background: var(--gold); border-color: var(--gold); color: var(--navy-dk); }
.prog-dot.active { background: #fff; border-color: #fff; color: var(--navy); }
.prog-dot.done::after {
  content: '✓';
  font-size: 13px;
}
.prog-label {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin: 0 6px;
  white-space: nowrap;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.prog-step.done .prog-label   { color: rgba(255,255,255,0.6); }
.prog-step.active .prog-label { color: rgba(255,255,255,0.9); }
.prog-connector {
  width: 28px; height: 2px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
  transition: background 0.3s;
}
.prog-connector.done { background: var(--gold); }

/* ─── MAIN CONTENT ───────────────────────────────────────────────── */
.main-wrap {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 36px 20px 60px;
}
.content-col {
  width: 100%;
  max-width: 780px;
}

/* ─── CARDS ──────────────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(18px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── WELCOME CARD ───────────────────────────────────────────────── */
.welcome-header {
  background: linear-gradient(135deg, var(--navy-dk) 0%, var(--navy) 60%, var(--slate) 100%);
  padding: 44px 44px 36px;
  position: relative;
  overflow: hidden;
}
.welcome-header::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(192,155,38,0.15);
}
.welcome-header::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.welcome-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(192,155,38,0.2);
  border: 1px solid rgba(192,155,38,0.4);
  color: var(--gold);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.welcome-header h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 32px; font-weight: 800;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}
.welcome-header h2 span { color: var(--gold); }
.welcome-header p {
  color: rgba(255,255,255,0.65);
  font-size: 15px; line-height: 1.6;
  max-width: 520px;
  position: relative; z-index: 1;
}
.welcome-body { padding: 32px 44px 40px; }
.welcome-steps {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}
.welcome-step {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  border: 1px solid var(--border);
}
.ws-num {
  width: 28px; height: 28px;
  background: var(--navy);
  color: #fff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.ws-text strong { font-size: 13px; font-weight: 700; display: block; margin-bottom: 2px; }
.ws-text span   { font-size: 12px; color: var(--muted); line-height: 1.5; }
.welcome-10min {
  background: var(--gold-lt);
  border: 1px solid var(--gold);
  border-left: 4px solid var(--gold);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 28px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.welcome-10min .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.welcome-10min p { font-size: 13px; line-height: 1.6; }
.welcome-10min strong { color: var(--navy); }
.btn-start {
  width: 100%;
  background: var(--navy);
  color: #fff;
  border: none;
  padding: 18px 32px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 17px; font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-start:hover { background: var(--navy-dk); transform: translateY(-1px); }
.btn-start:active { transform: translateY(0); }
.btn-start .arrow { font-size: 20px; transition: transform 0.2s; }
.btn-start:hover .arrow { transform: translateX(4px); }

/* ─── QUESTION CARD ──────────────────────────────────────────────── */
.q-header {
  padding: 24px 36px 0;
  display: flex;
  align-items: center;
  gap: 14px;
}
.q-section-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1.5px solid;
}
.badge-s1 { color: var(--navy); border-color: var(--navy); background: var(--navy-lt); }
.badge-s2 { color: var(--orange); border-color: var(--orange); background: var(--orange-lt); }

.q-num {
  font-size: 12px; font-weight: 700; color: var(--muted);
  margin-left: auto;
}
.q-body {
  padding: 22px 36px 0;
}
.q-body h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
.q-body .q-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 24px;
}
.options-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 36px 32px;
}
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 22px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: left;
  transition: all 0.18s;
  width: 100%;
}
.option-btn:hover {
  border-color: var(--navy);
  background: var(--navy-lt);
  transform: translateX(3px);
  box-shadow: 0 2px 12px rgba(31,56,100,0.1);
}
.option-letter {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--navy);
  color: #fff;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 15px;
  flex-shrink: 0;
}
.option-letter.opt-C { background: var(--orange); }
.option-letter.opt-Yes { background: var(--teal); }
.option-letter.opt-No  { background: var(--muted); }
.option-text strong {
  display: block;
  font-size: 15px; font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.option-text span {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* ─── NAV BUTTONS ────────────────────────────────────────────────── */
.q-nav {
  padding: 0 36px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-back {
  background: transparent;
  border: 1.5px solid var(--border);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--navy); color: var(--navy); }
.path-preview {
  margin-left: auto;
  font-size: 12px; color: var(--muted);
  font-weight: 600;
}
.path-preview span {
  display: inline-flex;
  background: var(--navy-lt);
  color: var(--navy);
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 700;
  margin-left: 4px;
  font-size: 11px;
}

/* ─── RESULT CARD ────────────────────────────────────────────────── */
.result-banner {
  padding: 32px 40px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  overflow: hidden;
}
.result-banner::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.result-code {
  font-family: 'Outfit', sans-serif;
  font-size: 64px; font-weight: 800;
  color: #fff;
  line-height: 1;
  flex-shrink: 0;
  text-shadow: 0 2px 16px rgba(0,0,0,0.2);
  position: relative;
}
.result-info { position: relative; }
.result-info .result-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 6px;
}
.result-info h2 {
  font-family: 'Outfit', sans-serif;
  font-size: 18px; font-weight: 700;
  color: #fff;
  line-height: 1.35;
  margin-bottom: 8px;
}
.result-info .result-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.result-tag {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.9);
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
}

/* banner color variants */
.banner-navy   { background: linear-gradient(135deg, var(--navy-dk), var(--navy)); }
.banner-teal   { background: linear-gradient(135deg, #0f4b45, var(--teal)); }
.banner-orange { background: linear-gradient(135deg, #8a3700, var(--orange)); }

/* result body */
.result-body { padding: 28px 40px 36px; }

.result-section {
  margin-bottom: 24px;
}
.result-section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}

/* requirements */
.req-list {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.req-chip {
  background: var(--navy-lt);
  color: var(--navy);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  border: 1px solid rgba(31,56,100,0.2);
}

/* no-DSA notice */
.nodsa-notice {
  background: #f3f5ff;
  border: 1.5px solid #c5cce8;
  border-left: 4px solid var(--navy);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px; color: var(--navy);
  font-weight: 600;
  margin-bottom: 10px;
  display: flex; gap: 8px; align-items: center;
}

/* phase labels */
.phase-label {
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0 12px;
}
.phase-pill {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 14px; border-radius: 20px;
  color: #fff;
}
.phase-pill.onsite { background: var(--teal); }
.phase-pill.later  { background: var(--navy); }
.phase-line { flex: 1; height: 1px; background: var(--border); }

/* steps */
.steps-list {
  display: flex; flex-direction: column; gap: 8px;
}
.step-item {
  display: flex; gap: 14px; align-items: flex-start;
}
.step-num {
  width: 26px; height: 26px;
  background: var(--navy);
  color: #fff;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}
.step-text {
  font-size: 14px; line-height: 1.6; color: var(--text);
  padding-top: 2px;
}
.step-text strong { color: var(--navy); font-weight: 700; }

/* bullet sub-items */
.step-bullets { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.step-bullet-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--border);
  font-size: 13px; line-height: 1.5; color: var(--text);
}
.step-bullet-item.roster { border-left-color: var(--navy); }
.step-bullet-item.dropin { border-left-color: var(--teal); }
.step-bullet-item .bull-label {
  font-weight: 700;
  flex-shrink: 0;
}
.step-bullet-item .bull-label.r { color: var(--navy); }
.step-bullet-item .bull-label.d { color: var(--teal); }
.step-bullet-item .bull-label.s { color: var(--orange); }
.step-bullet-item strong { color: var(--navy); font-weight: 700; }

/* Q4 box */
.q4-box {
  background: var(--orange-lt);
  border: 1.5px solid rgba(197,90,17,0.3);
  border-left: 4px solid var(--orange);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-top: 20px;
}
.q4-box .q4-title {
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--orange);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.q4-steps { display: flex; flex-direction: column; gap: 6px; }
.q4-step {
  display: flex; gap: 10px; font-size: 13px;
  line-height: 1.55; color: var(--text);
}
.q4-dot {
  width: 6px; height: 6px;
  background: var(--orange); border-radius: 50%;
  flex-shrink: 0; margin-top: 7px;
}
.q4-step strong { color: var(--navy); }

/* note box */
.note-box {
  background: var(--gold-lt);
  border: 1px solid rgba(192,155,38,0.35);
  border-left: 4px solid var(--gold);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  margin-top: 18px;
  font-size: 13px; line-height: 1.6; color: var(--text);
  display: flex; gap: 10px; align-items: flex-start;
}
.note-box .note-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }
.note-box strong { font-weight: 700; color: #7a6000; }

/* result actions */
.result-actions {
  display: flex; gap: 12px;
  padding: 0 40px 36px;
}
.btn-action {
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
  font-family: 'Mulish', sans-serif;
}
.btn-restart {
  background: var(--navy);
  color: #fff; border: none;
}
.btn-restart:hover { background: var(--navy-dk); }
.btn-print {
  background: #fff;
  color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-print:hover { border-color: var(--navy); background: var(--navy-lt); }

/* answer trail */
.answer-trail {
  padding: 16px 40px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.trail-item {
  font-size: 11px;
  display: flex; align-items: center; gap: 5px;
  color: var(--muted);
}
.trail-item .trail-q { font-weight: 600; }
.trail-item .trail-a {
  background: var(--navy-lt);
  color: var(--navy);
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 10px;
}
.trail-separator { color: var(--border); font-size: 16px; }

@media print {
  .site-header, .progress-bar-wrap, .result-actions, .answer-trail { display: none !important; }
  body { background: #fff; }
  .main-wrap { padding: 0; }
  .card { box-shadow: none; border: 1px solid #ddd; }
  .result-banner { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
@media (max-width: 600px) {
  .site-header { padding: 0 16px; }
  .progress-bar-wrap { padding: 10px 16px; }
  .welcome-header, .welcome-body { padding: 28px 24px; }
  .welcome-steps { grid-template-columns: 1fr; }
  .q-header, .q-body { padding-left: 24px; padding-right: 24px; }
  .options-grid, .q-nav { padding-left: 24px; padding-right: 24px; }
  .result-banner { flex-direction: column; gap: 14px; padding: 24px 28px; }
  .result-code { font-size: 48px; }
  .result-body, .result-actions, .answer-trail { padding-left: 24px; padding-right: 24px; }
}

/* ─── CHECKLIST RESULT FORMAT ────────────────────────────── */
.site-persona-bar { padding: 12px 40px; background: var(--navy-lt); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.site-persona-bar .sp-label { font-size: 11px; font-weight: 700; color: var(--navy); letter-spacing: 0.05em; text-transform: uppercase; }
.site-persona-bar .sp-name  { font-size: 14px; font-weight: 700; color: var(--navy); }
.meta-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 18px 40px 0; background: var(--bg); border-bottom: 1px solid var(--border); }
.meta-cell { padding: 12px 14px; background: #fff; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.meta-cell .mc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.meta-cell .mc-value { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
.checklist-body { padding: 20px 40px 28px; }
.cl-section { margin-bottom: 18px; }
.cl-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function getPathwayCode() {
  const a = state.answers;
  const numMap = {'AA':'1','AB':'2','BA':'3','BB':'4','CA':'5','CB':'6'};
  const num = numMap[(a.s1q1||'') + (a.s1q2||'')] || '?';
  let method = '?';
  if (a.s2q1 === 'A')       method = a.s2q3 === 'Yes' ? 'A' : 'B';
  else if (a.s2q2 === 'A')  method = a.s2q3 === 'Yes' ? 'C' : 'D';
  else if (a.s2q2 === 'B')  method = 'E';
  return num + method;
}

function getPartialCode() {
  const a = state.answers;
  if (!a.s1q1) return '';
  const numMap = {'A':'Roster','B':'Drop-In','C':'Hybrid'};
  let s = numMap[a.s1q1] || '';
  if (a.s1q2) s += (a.s1q2 === 'A') ? ' + Gen. Check-In' : ' + Direct';
  return s;
}

function getVisibleQuestions() {
  const a = state.answers;
  const qs = ['s1q1','s1q2','s2q1'];
  if (a.s2q1 === 'B') qs.push('s2q2');
  if (a.s2q1 === 'A' || a.s2q2 === 'A') qs.push('s2q3');
  qs.push('s2q4');
  return qs;
}

function currentQIndex() {
  return getVisibleQuestions().indexOf(state.history[state.history.length-1]);
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER: PROGRESS
// ═══════════════════════════════════════════════════════════════════
function renderProgress() {
  const bar = document.getElementById('progressBar');
  if (state.history.length === 0) { bar.innerHTML = ''; return; }
  const visQ = getVisibleQuestions();
  const cur = state.history[state.history.length-1];
  const qLabels = {s1q1:'Activity Type',s1q2:'Arrival',s2q1:'Entry Timing',s2q2:'Entry Method',s2q3:'Barcode?',s2q4:'Parent Sig.'};
  let html = '';
  visQ.forEach((qid, i) => {
    const answered = state.answers[qid] !== undefined;
    const active   = qid === cur && !answered;
    const done     = answered;
    if (i > 0) html += `<div class="prog-connector ${done?'done':''}"></div>`;
    html += `<div class="prog-step ${done?'done':''} ${active?'active':''}">
      <div class="prog-dot ${done?'done':''} ${active?'active':''}">${done?'':i+1}</div>
      <div class="prog-label">${qLabels[qid]||''}</div>
    </div>`;
  });
  if (cur === 'result') {
    html += `<div class="prog-connector done"></div>
      <div class="prog-step active">
        <div class="prog-dot active">✓</div>
        <div class="prog-label">Your Pathway</div>
      </div>`;
  }
  bar.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER: QUESTION
// ═══════════════════════════════════════════════════════════════════
function renderQuestion(qid) {
  const q = QUESTIONS[qid];
  const visQ = getVisibleQuestions();
  const idx  = visQ.indexOf(qid);
  const total = visQ.length;
  const partial = getPartialCode();

  const optionsHtml = q.options.map(opt => {
    let letterClass = `opt-${opt.value}`;
    let letter = opt.value;
    return `<button class="option-btn" onclick="selectAnswer('${qid}','${opt.value}')">
      <div class="option-letter ${letterClass}">${letter}</div>
      <div class="option-text">
        <strong>${opt.label}</strong>
        <span>${opt.desc}</span>
      </div>
    </button>`;
  }).join('');

  const showBack = state.history.length > 1;

  document.getElementById('cardArea').innerHTML = `
  <div class="card">
    <div class="q-header">
      <div class="q-section-badge badge-${q.section.toLowerCase()}">${q.sectionLabel}</div>
      <div class="q-num">Question ${idx+1} of ${total}</div>
    </div>
    <div class="q-body">
      <h2>${q.title}</h2>
      <p class="q-subtitle">${q.subtitle}</p>
    </div>
    <div class="options-grid">${optionsHtml}</div>
    <div class="q-nav">
      ${showBack ? `<button class="btn-back" onclick="goBack()">← Back</button>` : ''}
      ${partial ? `<div class="path-preview">Path so far: <span>${partial}</span></div>` : ''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER: RESULT
// ═══════════════════════════════════════════════════════════════════
function renderResult() {
  var code = getPathwayCode();
  var p    = PATHWAYS[code];
  var q4   = state.answers.s2q4 === 'Yes';
  if (!p) {
    document.getElementById('cardArea').innerHTML =
      '<div class="card" style="padding:40px;text-align:center"><h2>Could not determine pathway (' + code + '). Please start over.</h2></div>';
    return;
  }
  var bannerClass   = 'banner-' + p.color;
  var sectionColors = { navy:'#1F3864', teal:'#1B6B64', orange:'#C55A11' };
  var sectionColor  = sectionColors[p.color] || '#1F3864';

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function partsToHtml(parts) {
    return parts.map(function(part) {
      var content = part.link
        ? '<a href="' + part.link + '" target="_blank" rel="noopener">' + esc(part.text) + '</a>'
        : esc(part.text);
      return part.bold ? '<strong>' + content + '</strong>' : content;
    }).join('');
  }

  function renderItem(item) {
    if (item.continuation)      return '<div class="cl-continuation">' + esc(item.continuation) + '</div>';
    if (item.continuationParts) return '<div class="cl-continuation">' + partsToHtml(item.continuationParts) + '</div>';
    var content = item.text ? esc(item.text) : item.parts ? partsToHtml(item.parts) : '';
    return '<div class="cl-item"><div class="cl-checkbox">\u2610</div><div class="cl-text">' + content + '</div></div>';
  }

  var sectionsHtml = '';
  p.sections.forEach(function(sec) {
    var itemsHtml = sec.items.map(renderItem).join('');
    sectionsHtml += '<div class="cl-section"><div class="cl-section-header"><div class="cl-section-title" style="background:' + sectionColor + '">' + esc(sec.title) + '</div><div class="cl-section-line"></div></div>' + itemsHtml + '</div>';
  });

  var qLabels = {s1q1:'Activity Type',s1q2:'Arrival',s2q1:'Timing',s2q2:'Method',s2q3:'Barcode',s2q4:'Parent Sig.'};
  var trailItems = Object.entries(state.answers).map(function(entry, i, arr) {
    var k = entry[0], v = entry[1];
    return '<span class="trail-item"><span class="trail-q">' + (qLabels[k]||k) + ':</span><span class="trail-a">' + v + '</span></span>' + (i < arr.length-1 ? '<span class="trail-separator">\u00b7</span>' : '');
  }).join('');

  // Check-Out Pattern: if user answered Q4=Yes but pathway is C0, show C1
  var checkoutDisplay = p.checkoutPattern;
  if (q4 && !p.hasSig) checkoutDisplay = 'C1 \u2013 Parent/guardian signature required';

  var tags = '<span class="result-tag">' + esc(p.structure.split(' + ')[0]) + '</span>';
  if (p.structure.indexOf(' + ') >= 0) tags += '<span class="result-tag">' + esc(p.structure.split(' + ').slice(1).join(' + ')) + '</span>';
  if (q4 && !p.hasSig) tags += '<span class="result-tag">+ Parent Signature</span>';
  if (p.hasSig)        tags += '<span class="result-tag">Signature Required</span>';

  document.getElementById('cardArea').innerHTML =
    '<div class="card">' +
      '<div class="result-banner ' + bannerClass + '"><div class="result-code">' + code + '</div><div class="result-info"><div class="result-label">Your AS21 Daily Process Pathway</div><h2>' + esc(p.method) + '</h2><div class="result-tags">' + tags + '</div></div></div>' +
      '<div class="site-persona-bar"><div class="sp-label">Example Site</div><div class="sp-name">' + esc(p.site) + '</div></div>' +
      '<div class="meta-grid"><div class="meta-cell"><div class="mc-label">Arrival Pattern</div><div class="mc-value">' + esc(p.arrivalPattern) + '</div></div><div class="meta-cell"><div class="mc-label">Entry Method</div><div class="mc-value">' + esc(p.entryMethod) + '</div></div><div class="meta-cell"><div class="mc-label">Check-Out Pattern</div><div class="mc-value">' + esc(checkoutDisplay) + '</div></div></div>' +
      '<div class="checklist-body">' + sectionsHtml + '</div>' +
      '<div class="result-actions"><button class="btn-action btn-restart" onclick="restart()">\u2190 Start Over</button><button class="btn-action btn-print" onclick="window.print()">\ud83d\udda8 Print Checklist</button></div>' +
      '<div class="answer-trail">' + trailItems + '</div>' +
    '</div>';
}


// ═══════════════════════════════════════════════════════════════════
//  FLOW CONTROL
// ═══════════════════════════════════════════════════════════════════
function startQuiz() {
  state.answers = {};
  state.history = ['s1q1'];
  renderProgress();
  renderQuestion('s1q1');
}

function selectAnswer(qid, value) {
  state.answers[qid] = value;
  const q    = QUESTIONS[qid];
  const next = q.next(value);
  state.history.push(next);
  renderProgress();
  if (next === 'result') renderResult();
  else renderQuestion(next);
}

function goBack() {
  if (state.history.length <= 1) { restart(); return; }
  const prev = state.history[state.history.length - 2];
  // Remove last entry and clear answer for current
  delete state.answers[state.history[state.history.length - 1]];
  state.history.pop();
  renderProgress();
  if (prev === 'welcome' || state.history.length === 0) { state.history = []; renderWelcome(); }
  else renderQuestion(prev);
}

function restart() {
  state.answers = {};
  state.history = [];
  document.getElementById('progressBar').innerHTML = '';
  renderWelcome();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
renderWelcome();
</script>
